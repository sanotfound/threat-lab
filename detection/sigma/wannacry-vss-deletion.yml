title: WannaCry - Volume Shadow Copy Deletion via vssadmin
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: |
    Detects the deletion of Volume Shadow Copies using vssadmin, a behavior
    consistently observed in WannaCry infections and common across ransomware families.
    WannaCry executes this command to prevent file recovery via Windows backup mechanisms.
references:
    - https://github.com/sanotfound/threat-lab/blob/main/analysis/malware/ransomware/wannacry.md
    - https://www.secureworks.com/research/wcry-ransomware-analysis
    - https://attack.mitre.org/techniques/T1490/
author: threat-lab
date: 2025-01-01
tags:
    - attack.impact
    - attack.t1490           # Inhibit System Recovery
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\vssadmin.exe'
        CommandLine|contains|all:
            - 'delete'
            - 'shadows'
    condition: selection
falsepositives:
    - Legitimate backup software that manages shadow copies
    - System administrators manually managing VSS
    - Some enterprise backup solutions use this command during maintenance
level: high
fields:
    - Image
    - CommandLine
    - ParentImage
    - User

