title: WannaCry - Suspicious Service Creation (mssecsvc2.0)
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: |
    Detects creation of the Windows service mssecsvc2.0, which WannaCry installs
    as a persistence mechanism disguised as a Microsoft security service.
references:
    - https://github.com/sanotfound/threat-lab/blob/main/analysis/malware/ransomware/wannacry.md
author: threat-lab
date: 2025-01-01
tags:
    - attack.persistence
    - attack.t1543.003       # Create or Modify System Process: Windows Service
logsource:
    product: windows
    service: system
detection:
    selection:
        EventID: 7045          # A new service was installed
        ServiceName: 'mssecsvc2.0'
    condition: selection
falsepositives:
    - None expected. This service name is not used by any legitimate Microsoft product.
level: critical
fields:
    - ServiceName
    - ServiceFileName
    - ServiceType
